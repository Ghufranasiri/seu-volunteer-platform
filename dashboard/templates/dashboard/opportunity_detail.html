{% extends 'base.html' %}

{% block title %}Opportunity Detail{% endblock %}

{% block content %}
<section class="section">
    <div class="container" style="max-width:800px;">
        <div class="card">
            <h2>{{ opportunity.title }}</h2>
            <p>{{ opportunity.description }}</p>
            <p><strong>Location:</strong> {{ opportunity.location }}</p>

            {% if user.is_authenticated %}
                <a href="{% url 'register_opportunity' opportunity.pk %}" class="btn-primary">Register</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn-primary">Login to Register</a>
            {% endif %}
        </div>
    </div>
</section>
{% endblock %}
