{% extends 'base.html' %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <h2>Dashboard</h2>
        <p>Overview of the platform.</p>

        <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:18px;">
            <div class="card">
                <h3>Total Users</h3>
                <p>{{ total_users }}</p>
            </div>
            <div class="card">
                <h3>Active Opportunities</h3>
                <p>{{ active_opportunities }}</p>
            </div>
            <div class="card">
                <h3>Pending Requests</h3>
                <p>{{ pending_requests }}</p>
            </div>
        </div>

        <div style="margin-top:24px;">
            <a href="{% url 'manage_users' %}" class="btn-primary">Manage Users</a>
            <a href="{% url 'approve_hours' %}" class="btn-secondary">Approve Hours</a>
        </div>
    </div>
</section>
{% endblock %}
