{% extends 'base.html' %}

{% block title %}Manage Users{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <div class="card">
            <h2>Manage Users</h2>

            <table>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                </tr>
                {% for user in users %}
                <tr>
                    <td>{{ user.id }}</td>
                    <td>{{ user.first_name }}</td>
                    <td>{{ user.email }}</td>
                </tr>
                {% endfor %}
            </table>
        </div>
    </div>
</section>
{% endblock %}
