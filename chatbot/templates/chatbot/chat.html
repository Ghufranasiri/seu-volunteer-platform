<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chatbot</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }

        .chat-box {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        #messages {
            height: 250px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            margin-bottom: 10px;
        }

        input {
            width: 70%;
            padding: 10px;
        }

        button {
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="chat-box">
    <h2>Chatbot 🤖</h2>

    <div id="messages"></div>

    <input type="text" id="userInput" placeholder="Type your message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    function sendMessage() {
        let input = document.getElementById("userInput").value;
        let messages = document.getElementById("messages");

        if (input === "") return;

        // user message
        messages.innerHTML += "<p><b>You:</b> " + input + "</p>";

        
        messages.innerHTML += "<p><b>Bot:</b> I received: " + input + "</p>";

        document.getElementById("userInput").value = "";
        messages.scrollTop = messages.scrollHeight;
    }
</script>

</body>
</html>
