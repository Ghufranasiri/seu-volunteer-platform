{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container" style="max-width:500px;">
    <div class="card">
        <h2>{% if request.LANGUAGE_CODE == 'ar' %}تسجيل الدخول{% else %}Login{% endif %}</h2>

        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="{% if request.LANGUAGE_CODE == 'ar' %}البريد أو اسم المستخدم{% else %}Email or username{% endif %}" style="width:100%; padding:12px; margin-bottom:12px;">
            <input type="password" name="password" placeholder="{% if request.LANGUAGE_CODE == 'ar' %}كلمة المرور{% else %}Password{% endif %}" style="width:100%; padding:12px; margin-bottom:12px;">
            <button type="submit" class="btn-primary" style="border:none;">
                {% if request.LANGUAGE_CODE == 'ar' %}دخول{% else %}Login{% endif %}
            </button>
        </form>
    </div>
</div>
{% endblock %}
