{% load static %}
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شهادة إتمام</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Great+Vibes&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
@page {
    size: 210mm 210mm;
    margin: 0;
}

html, body {
    height: 100%;
}

body {
    margin: 0;
    background: #f3efe6;
    font-family: 'Cairo', sans-serif;
}


.title,
.subtitle,
.presented,
.desc,
.sig-label,
.sig-name,
.bottom {
    direction: rtl;
}

.page {
    width: 210mm;
    height: 210mm;
    margin: 0 auto;
    overflow: hidden;
    background: #f9f6ef;
    position: relative;
    border: 3px solid #c7a86b;
    box-shadow: none;
    padding: 14px;
    box-sizing: border-box;
}

.page::before {
    content: "";
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    bottom: 10px;
    border: 1.5px solid #c7a86b;
}

.ornament {
    position: absolute;
    color: #b9985a;
    font-size: 42px;
}

.tl { top: 16px; left: 20px; }
.tr { top: 16px; right: 20px; }
.bl { bottom: 16px; left: 20px; }
.br { bottom: 16px; right: 20px; }

.top-center {
    text-align: center;
    padding-top: 42px;
}

.logo {
    width: 150px;
    display: block;
    margin: 0 auto 6px;
}

.wax-seal {
    width: 58px;
    height: 58px;
    background: radial-gradient(circle, #b30000, #5a0000);
    border-radius: 60%;
    margin: 6px auto 10px;
}

.title {
    text-align: center;
    color: #1f2744;
    font-size: 42px;
    font-weight: 700;
    margin-top: 8px;
}

.subtitle {
    text-align: center;
    color: #1f2744;
    font-size: 30px;
    font-weight: 600;
    margin-top: 4px;
}

.presented {
    text-align: center;
    margin-top: 14px;
    font-size: 22px;
}

.name {
    text-align: center;
    margin-top: 18px;
    font-family: 'Great Vibes', cursive;
    font-size: 52px;
}

.name-line {
    width: 360px;
    margin: 8px auto 18px;
    border-top: 1px solid #c9ae7a;
}

.desc {
    text-align: center;
    font-size: 22px;
    margin-top: 10px;
}

.activity {
    text-align: center;
    font-size: 34px;
    font-weight: 700;
    margin-top: 14px;
}

.activity-line {
    width: 240px;
    margin: 10px auto 24px;
    border-top: 1px solid #c9ae7a;
}

.bottom {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    column-gap: 30px;
    margin: 35px 45px 0;
}

.sig-block {
    text-align: center;
}

.sig-line {
    width: 230px;
    margin: 0 auto 10px;
    border-top: 1px solid #6b6b6b;
}

.sig-label {
    font-size: 16px;
}

.sig-name {
    font-size: 16px;
    margin-top: 6px;
}

.middle-mark {
    font-size: 22px;
    color: #b9985a;
    align-self: center;
}

.lang-switch {
    text-align: center;
    margin: 28px 0 10px;
}

.pdf-btn {
    display: block;
    margin: 14px auto 28px;
}


@media print {
    .lang-switch,
    .pdf-btn,
    .print-btn,
    button {
        display: none !important;
    }

    body {
        background: white;
        margin: 0;
        padding: 0;
        width: 210mm;
        height: 210mm;
        overflow: hidden;
        background: white;
    }

    .page {
        margin: 0 auto;
        box-shadow: none;
    }
}
</style>
</head>

<body>

<div class="page">

<div class="ornament tl">❦</div>
<div class="ornament tr">❦</div>
<div class="ornament bl">❦</div>
<div class="ornament br">❦</div>

<div class="top-center">
<img src="{% static 'logo_new.png' %}" class="logo">
<div class="wax-seal"></div>
</div>

<div class="title">شهادة</div>
<div class="subtitle">إتمام</div>

<div class="presented">تُمنح هذه الشهادة إلى</div>

<div class="name">{{ certificate.user.username }}</div>
<div class="name-line"></div>

<div class="desc">لإتمامه بنجاح النشاط التطوعي:</div>
<div class="activity">{{ certificate.opportunity.name }}</div>
<div class="activity-line"></div>

<div class="bottom">

<div class="sig-block">
<div class="sig-line"></div>
<div class="sig-label">التاريخ</div>
<div class="sig-name">{{ certificate.issued_at|date:"Y-m-d" }}</div>
</div>

<div class="middle-mark">❦</div>

<div class="sig-block">
<div class="sig-line"></div>
<div class="sig-label">مديرة برنامج التطوع</div>
<div class="sig-name">د. باسمة الجهني</div>
</div>

</div>

</div>

<div class="lang-switch">
<a href="/users/certificate/{{ certificate.id }}/">English</a>
</div>

<button class="pdf-btn" onclick="window.print()">تحميل PDF</button>

</body>
</html>
